<!DOCTYPE html>
<html>
<head>
    <title>Template 1 - GST Invoice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface-2: #16161f;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a84c;
    --gold-light: #e4c67a;
    --text: #f0ede8;
    --text-muted: rgba(240,237,232,0.45);
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
}

.topbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
}

.logo {
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
}

.page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
}

.section {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
}

.section-header {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.05em;
}

.section-body {
    padding: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.form-grid.three {
    grid-template-columns: 1fr 1fr 1fr;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full {
    grid-column: 1 / -1;
}

label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 5px;
}

input, select {
    padding: 8px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
}

.items-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.item-row {
    display: grid;
    grid-template-columns: 1fr 120px 120px auto;
    gap: 10px;
}

.remove-btn {
    background: none;
    border: 1px solid red;
    color: red;
    cursor: pointer;
    padding: 6px;
}

.actions-bar {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    background: var(--gold);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

@media(max-width:700px){
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
    .item-row { grid-template-columns: 1fr 1fr; }
}

</style>
</head>

<body>

<header class="topbar">
    <a href="home.html" class="logo">Invoicer</a>
</header>

<div class="page">

<form onsubmit="return generateInvoice(event)">

<!-- Hidden Seller Fields -->
<input type="hidden" name="sellerName" value="ESKAY CHEMICALS & FOODS">
<input type="hidden" name="sellerAddress" value="2/209, RKV NAGAR, THEETHIPALAYAM (PO), COIMBATORE - 641 010">
<input type="hidden" name="sellerGstin" value="33BJZPS9366N1ZT">
<input type="hidden" name="sellerPan" value="BJZPS9366N">
<input type="hidden" name="modeOfPayment" value="Credit">
<input type="hidden" name="dispatchThrough" value="Direct">
<input type="hidden" name="bankDetails" value="South Indian Bank - Theethipalayam">
<input type="hidden" name="terms" value="Standard terms apply">

<!-- Seller Banner -->
<div class="section">
<div class="section-header">Seller</div>
<div class="section-body">
<b>ESKAY CHEMICALS & FOODS</b><br>
2/209, RKV Nagar, Theethipalayam (PO), Coimbatore – 641 010<br>
GSTIN: 33BJZPS9366N1ZT | PAN: BJZPS9366N
</div>
</div>

<!-- Invoice Details -->
<div class="section">
<div class="section-header">Invoice Details</div>
<div class="section-body">
<div class="form-grid three">
<div class="form-group">
<label>Invoice Number</label>
<input type="text" name="invoiceNumber" required>
</div>

<div class="form-group">
<label>Invoice Date</label>
<input type="date" name="invoiceDate" required>
</div>

<div class="form-group">
<label>Buyer Order Date</label>
<input type="date" name="buyerOrderDate" required>
</div>

<div class="form-group">
<label>Copy Type</label>
<select name="copyType">
<option>ORIGINAL</option>
<option>DUPLICATE</option>
</select>
</div>

</div>
</div>
</div>

<!-- Buyer Details -->
<div class="section">
<div class="section-header">Buyer Details</div>
<div class="section-body">
<div class="form-grid">

<div class="form-group full">
<label>Buyer Name</label>
<input type="text" name="buyerName" value="SRIPATHI PRINTING" required>
</div>

<div class="form-group">
<label>Address Line 1</label>
<input type="text" name="buyerAddressLine1" value="S.F.NO.273, PALLAKATTUPUDUR,"required>
</div>

<div class="form-group">
<label>Address Line 2</label>
<input type="text" name="buyerAddressLine2" value="KANGEYAM MAIN ROAD," required>
</div>

<div class="form-group full">
<label>Address Line 3</label>
<input type="text" name="buyerAddressLine3" value="TIRUPUR - 641 606." required>
</div>

<div class="form-group">
<label>Buyer GSTIN</label>
<input type="text" name="buyerGstin" value="33BCEPM0623C1ZC">
</div>

<div class="form-group">
<label>Buyer PAN</label>
<input type="text" name="buyerPan" value="BCEPM0623C">
</div>

</div>
</div>
</div>

<!-- Items -->
<div class="section">
<div class="section-header">Line Items</div>
<div class="section-body">

<div class="items-container" id="items-container">

<div class="item-row">
<div class="form-group">
<label>Description</label>
<input type="text" name="description" required>
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" name="quantity" step="0.01" required>
</div>

<div class="form-group">
<label>Rate</label>
<input type="number" name="rate" step="0.01" required>
</div>

<div style="display:flex;align-items:flex-end;">
<div style="width:30px;"></div>
</div>
</div>

</div>

<div class="actions-bar">
<button type="button" onclick="addItem()">Add Item</button>
<button type="submit">Generate Invoice</button>
</div>

</div>
</div>

</form>
</div>

<script>

function addItem(){
const container=document.getElementById("items-container");
const div=document.createElement("div");
div.className="item-row";
div.innerHTML=`
<div class="form-group">
<label>Description</label>
<input type="text" name="description" required>
</div>
<div class="form-group">
<label>Quantity</label>
<input type="number" name="quantity" step="0.01" required>
</div>
<div class="form-group">
<label>Rate</label>
<input type="number" name="rate" step="0.01" required>
</div>
<div style="display:flex;align-items:flex-end;">
<button type="button" class="remove-btn" onclick="this.closest('.item-row').remove()">X</button>
</div>`;
container.appendChild(div);
}

function numberToWords(num) {
    const a = ['', 'One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
               'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen',
               'Eighteen','Nineteen'];
    const b = ['', '', 'Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];

    function inWords(n){
        if(n < 20) return a[n];
        if(n < 100) return b[Math.floor(n/10)] + " " + a[n%10];
        if(n < 1000) return a[Math.floor(n/100)] + " Hundred " + inWords(n%100);
        if(n < 100000) return inWords(Math.floor(n/1000)) + " Thousand " + inWords(n%1000);
        if(n < 10000000) return inWords(Math.floor(n/100000)) + " Lakh " + inWords(n%100000);
        return inWords(Math.floor(n/10000000)) + " Crore " + inWords(n%10000000);
    }

    return inWords(num) + " Only";
}

function generateInvoice(e){
    e.preventDefault();

    const data = {};

    // Invoice
    data.invoiceNumber = document.querySelector("[name='invoiceNumber']").value;
    data.invoiceDate = document.querySelector("[name='invoiceDate']").value;
    data.buyerOrderDate = document.querySelector("[name='buyerOrderDate']").value;
    data.copyType = document.querySelector("[name='copyType']").value;

    // Buyer
    data.buyerName = document.querySelector("[name='buyerName']").value;
    data.buyerAddressLine1 = document.querySelector("[name='buyerAddressLine1']").value;
    data.buyerAddressLine2 = document.querySelector("[name='buyerAddressLine2']").value;
    data.buyerAddressLine3 = document.querySelector("[name='buyerAddressLine3']").value;
    data.buyerGstin = document.querySelector("[name='buyerGstin']").value;
    data.buyerPan = document.querySelector("[name='buyerPan']").value;

    const desc = document.getElementsByName("description");
    const qty = document.getElementsByName("quantity");
    const rate = document.getElementsByName("rate");

    data.items = [];

    let subtotal = 0;
    let totalWeight = 0;

    for(let i=0;i<desc.length;i++){
        let q = parseFloat(qty[i].value);
        let r = parseFloat(rate[i].value);
        let amt = q * r;

        subtotal += amt;
        totalWeight += q;

        data.items.push({
            description: desc[i].value,
            quantity: q,
            rate: r,
            amount: amt.toFixed(2)
        });
    }

    data.totalWeight = totalWeight.toFixed(2);
    data.totalAmount = subtotal.toFixed(2);
    data.cgst = (subtotal * 0.09).toFixed(2);
    data.sgst = (subtotal * 0.09).toFixed(2);
    data.grandTotal = (subtotal * 1.18).toFixed(2);
    data.amountWords = numberToWords(Math.round(data.grandTotal));

    localStorage.setItem("invoiceData", JSON.stringify(data));

    window.location.href = "template1-view.html";
}
</script>
</body>
</html>
