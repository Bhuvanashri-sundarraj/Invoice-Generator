<!DOCTYPE html>
<html>
<head>
    <title>Security Question</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0a0f;
            color: #f0ede8;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .logo {
            text-decoration: none;
            color: #f0ede8;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.15em;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: #111118;
            border: 1px solid rgba(255,255,255,0.07);
            padding: 30px;
            max-width: 420px;
            width: 100%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(240,237,232,0.45);
        }

        input {
            width: 100%;
            margin-top: 6px;
            margin-bottom: 20px;
            padding: 10px;
            background: #16161f;
            border: 1px solid rgba(255,255,255,0.07);
            color: #f0ede8;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #c9a84c;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .error {
            margin-top: 10px;
            color: #e07070;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.07);
            font-size: 0.75rem;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="home.html" class="logo">Invoicer</a>
</header>

<main class="main">
    <div class="card">
        <h1>Security Question</h1>

        <p style="margin-bottom:15px;">
            <em>Which is the best name you ever remember?</em>
        </p>

        <form onsubmit="return checkAnswer(event)">
            <label>Your Answer</label>
            <input type="text" id="answer" required>

            <button type="submit">Submit</button>
        </form>

        <div class="error" id="errorMsg"></div>

        <div style="text-align:center;margin-top:15px;">
            <a href="login.html" style="color:#c9a84c;">← Back to Login</a>
        </div>
    </div>
</main>

<footer class="footer">
    © 2026 Invoicer · Account Recovery
</footer>

<script>
const USER = {
    username: "SKBchem",
    password: "Skb151275",
    securityAnswer: "Maggie"
};

function checkAnswer(e){
    e.preventDefault();

    const ans = document.getElementById("answer").value.trim().toLowerCase();

    if(ans === USER.securityAnswer.toLowerCase()){
        localStorage.setItem("recoveredPassword", USER.password);
        window.location.href = "show-password.html";
    } else {
        document.getElementById("errorMsg").innerText = "Wrong Answer";
    }

    return false;
}
</script>

</body>
</html>
