<!DOCTYPE html>
<html>
<head>
    <title>Your Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0a0f;
            color: #f0ede8;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .logo {
            text-decoration: none;
            color: #f0ede8;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.15em;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: #111118;
            border: 1px solid rgba(255,255,255,0.07);
            padding: 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .password-box {
            background: #16161f;
            padding: 14px;
            border: 1px solid rgba(201,168,76,0.3);
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #e4c67a;
        }

        .footer {
            text-align: center;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.07);
            font-size: 0.75rem;
        }
    </style>
</head>

<body>

<header class="topbar">
    <a href="home.html" class="logo">Invoicer</a>
</header>

<main class="main">
    <div class="card">
        <h1>Your Password</h1>

        <div class="password-box" id="passBox"></div>

        <p style="font-size:0.8rem;color:#e07070;">
            Please keep it safe and do not share with anyone.
        </p>

        <div style="margin-top:15px;">
            <a href="login.html" style="color:#c9a84c;">← Back to Login</a>
        </div>
    </div>
</main>

<footer class="footer">
    © 2026 Invoicer · Account Recovery
</footer>

<script>
const pass = localStorage.getItem("recoveredPassword");

document.getElementById("passBox").innerText =
    pass ? pass : "No password available";
</script>

</body>
</html>
